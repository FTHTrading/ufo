name: Deploy to GitHub Pages (Web3 hybrid static)

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - uses: actions/configure-pages@v4
      - run: npm install
      - run: npm run build
        env:
          NODE_ENV: production
      - name: Add .nojekyll (for Pages static sites with _next) and debug out contents
        run: |
          touch ./out/.nojekyll
          ls -la ./out || true
          echo "=== index.html locations ==="
          find ./out -name index.html | head -5 || true
          echo "=== top level files ==="
          find ./out -maxdepth 2 -type f | head -50 || true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./out
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4